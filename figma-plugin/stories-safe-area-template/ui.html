<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { font-family: Inter, -apple-system, sans-serif; margin: 0; padding: 16px; color: var(--figma-color-text); background: var(--figma-color-bg); }
  h1 { font-size: 13px; margin: 0 0 8px; font-weight: 600; }
  p { font-size: 12px; line-height: 1.5; color: var(--figma-color-text-secondary); margin: 0 0 10px; }
  ul { font-size: 12px; line-height: 1.5; color: var(--figma-color-text-secondary); margin: 0 0 12px; padding-left: 18px; }
  li { margin-bottom: 4px; }
  button { width: 100%; padding: 10px; font-size: 13px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; }
  .primary { background: #18181b; color: #fff; margin-bottom: 8px; }
  .ghost { background: transparent; color: var(--figma-color-text-secondary); border: 1px solid var(--figma-color-border); }
</style>
</head>
<body>
  <h1>Stories — шаблон safe-зон</h1>
  <p>Соберёт 5 нативных фреймов (16:9 / 18:9 / 19.5:9 / 20:9 база / 21:9) с одинаковой зелёной safe-зоной, chrome-полосами и подписями.</p>
  <ul>
    <li>Фон рисуем на весь кадр.</li>
    <li>Текст и лого — в зелёной зоне.</li>
    <li>База авторинга — 20:9 (360×800).</li>
  </ul>
  <button class="primary" id="build">Собрать шаблон</button>
  <button class="ghost" id="close">Закрыть</button>
<script>
  document.getElementById('build').onclick = () => parent.postMessage({ pluginMessage: { type: 'build' } }, '*');
  document.getElementById('close').onclick = () => parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
</script>
</body>
</html>
