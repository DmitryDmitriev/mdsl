<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root { color-scheme: light dark; }
  body { font: 12px/1.4 -apple-system, system-ui, sans-serif; margin: 0; padding: 12px; }
  h1 { font-size: 13px; margin: 0 0 8px; }
  .controls { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; }
  select, button { font: inherit; padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; background: #fff; }
  button.primary { background: #18a0fb; color: #fff; border-color: #18a0fb; cursor: pointer; }
  button.primary:hover { background: #0d8de0; }
  .status { color: #888; margin-bottom: 8px; min-height: 14px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 4px 6px; border-bottom: 1px solid #eee; }
  th { font-weight: 600; color: #666; font-size: 11px; }
  tr.row { cursor: pointer; }
  tr.row:hover { background: #f5f5f5; }
  td.pct { text-align: right; font-variant-numeric: tabular-nums; width: 40px; }
  .bad  { color: #d62828; font-weight: 600; }
  .mid  { color: #d68a02; }
  .good { color: #2a9d4a; }
  details { margin-top: 8px; }
  details pre { font-size: 10px; max-height: 200px; overflow: auto; background: #f7f7f7; padding: 6px; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
  details summary { cursor: pointer; font-weight: 600; padding: 4px 0; }
  details summary .count { color: #888; font-weight: 400; }
  .category-foreign summary .count { color: #d62828; }
  .category-namespace summary .count { color: #d68a02; }
  tr.row.selected { background: #18a0fb22; }
  @media (prefers-color-scheme: dark) {
    body { background: #2c2c2c; color: #eee; }
    select, button { background: #3a3a3a; color: #eee; border-color: #555; }
    th { color: #aaa; }
    th, td { border-color: #444; }
    tr.row:hover { background: #3a3a3a; }
    tr.row.selected { background: #18a0fb33; }
    details pre { background: #1f1f1f; }
  }
</style>
</head>
<body>
  <h1>DS Audit Scanner</h1>
  <div class="controls">
    <select id="scope">
      <option value="page" selected>Текущая страница</option>
      <option value="selection">Выделенные SET'ы / FRAME'ы</option>
      <option value="document">Весь документ</option>
    </select>
    <button class="primary" id="run">Токены</button>
    <button id="copy" title="Скопировать JSON отчёт с тремя категориями">⧉ JSON</button>
  </div>
  <div class="status" id="status">Готов к запуску.</div>
  <details id="libs-block" hidden>
    <summary>📚 Подключённые библиотеки <span class="count" id="libs-count"></span></summary>
    <pre id="libs"></pre>
  </details>
  <table id="results" hidden>
    <thead>
      <tr><th>Компонент</th><th class="pct">Color</th><th class="pct">Token</th><th class="pct">Type</th><th class="pct">All</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <details id="problems-block" hidden>
    <summary>Не привязано к токену <span class="count" id="not-bound-count"></span></summary>
    <pre id="problems"></pre>
  </details>
  <details id="foreign-block" class="category-foreign" hidden>
    <summary>Foreign library bindings <span class="count" id="foreign-count"></span></summary>
    <pre id="foreign"></pre>
  </details>
  <details id="namespace-block" class="category-namespace" hidden>
    <summary>Namespace mismatch (spacing) <span class="count" id="namespace-count"></span></summary>
    <pre id="namespace"></pre>
  </details>

<script>
  const $ = (id) => document.getElementById(id);
  let lastReport = null;

  function cls(p) { return p >= 90 ? "good" : p >= 70 ? "mid" : "bad"; }

  function resetUI() {
    $("results").hidden = true;
    $("problems-block").hidden = true;
    $("foreign-block").hidden = true;
    $("namespace-block").hidden = true;
  }

  $("run").onclick = () => {
    const scope = $("scope").value;
    $("status").textContent = "Сканирую токены…";
    resetUI();
    parent.postMessage({ pluginMessage: { type: "run", scope } }, "*");
  };

  $("copy").onclick = () => {
    if (!lastReport) return;
    navigator.clipboard.writeText(JSON.stringify(lastReport, null, 2));
    $("status").textContent = "JSON скопирован.";
  };

  window.onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;
    if (msg.type === "progress") {
      if (msg.phase === "prefetch") {
        $("status").textContent = "Загружаю список переменных из подключённых библиотек…";
        return;
      }
      if (msg.current) $("status").textContent = `${msg.current}/${msg.total}: ${msg.name}`;
      else $("status").textContent = `Найдено компонентов: ${msg.total}`;
    }
    if (msg.type === "prefetch-done") {
      const sum = msg.summary || [];
      const lines = sum.map(l =>
        `${l.allowed ? "✓" : "✗"} ${l.libraryName} — ${l.vars} переменных / ${l.collections} коллекций${l.allowed ? "" : "  ← не в allowed-list"}`
      );
      if (msg.error) lines.push(`⚠ prefetch error: ${msg.error}`);
      lines.push("");
      lines.push(`Итого known variable keys: ${msg.knownVarCount}`);
      lines.push(`(имена сравниваются через includes() со списком ALLOWED_LIBRARY_NAMES в code.js)`);
      $("libs").textContent = lines.join("\n");
      $("libs-count").textContent = `· ${msg.knownVarCount}`;
      $("libs-block").hidden = false;
      console.log(`[ds-audit] prefetch summary:`, sum);
      if (msg.error) console.warn(`[ds-audit] prefetch error: ${msg.error}`);
    }
    if (msg.type === "report") {
      lastReport = { results: msg.results, categories: msg.categories };
      const tbody = $("results").querySelector("tbody");
      tbody.innerHTML = "";
      const probs = [];
      for (const r of msg.results) {
        const tr = document.createElement("tr");
        tr.className = "row";
        tr.onclick = () => parent.postMessage({ pluginMessage: { type: "focus", id: r.id } }, "*");
        tr.innerHTML = `
          <td>${r.name}</td>
          <td class="pct ${cls(r.color)}">${r.color}</td>
          <td class="pct ${cls(r.token)}">${r.token}</td>
          <td class="pct ${cls(r.type)}">${r.type}</td>
          <td class="pct ${cls(r.overall)}">${r.overall}</td>`;
        tbody.appendChild(tr);
        if (r.problems.length) {
          probs.push(`▼ ${r.name} (${r.overall}%)`);
          for (const p of r.problems) probs.push(`  · ${p}`);
        }
      }
      $("results").hidden = false;

      // Категория 1: not-bound (старые «проблемы»)
      $("problems").textContent = probs.join("\n");
      $("not-bound-count").textContent = `· ${msg.categories["not-bound"].length}`;
      $("problems-block").hidden = msg.categories["not-bound"].length === 0;

      // Категория 2: foreign-binding
      const foreignLines = [];
      for (const f of msg.categories["foreign-binding"]) {
        const varDesc = f.varName ? `\`${f.varName}\`` : "(unresolved)";
        foreignLines.push(`▼ ${f.componentName} / ${f.nodeName}\n  · ${f.field} → ${varDesc}\n  · ${f.reason}`);
      }
      $("foreign").textContent = foreignLines.join("\n\n");
      $("foreign-count").textContent = `· ${msg.categories["foreign-binding"].length}`;
      $("foreign-block").hidden = msg.categories["foreign-binding"].length === 0;

      // Категория 3: namespace-mismatch
      const nsLines = [];
      for (const m of msg.categories["namespace-mismatch"]) {
        nsLines.push(`▼ ${m.componentName} / ${m.nodeName}\n  · ${m.field} использует \`${m.varName}\`\n  · контекст: ${m.context} → ожидалось ${m.expected}/*`);
      }
      $("namespace").textContent = nsLines.join("\n\n");
      $("namespace-count").textContent = `· ${msg.categories["namespace-mismatch"].length}`;
      $("namespace-block").hidden = msg.categories["namespace-mismatch"].length === 0;

      const avg = Math.round(msg.results.reduce((s, r) => s + r.overall, 0) / (msg.results.length || 1));
      const cat = msg.categories;
      $("status").textContent = `Готово. ${msg.results.length} компонентов · ${avg}% overall · not-bound: ${cat["not-bound"].length} · foreign: ${cat["foreign-binding"].length} · namespace: ${cat["namespace-mismatch"].length}`;
    }
  };
</script>
</body>
</html>
