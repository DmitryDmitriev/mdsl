<svg width="1920" height="960" viewBox="0 0 1920 960" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1920" height="960" fill="#1D2023"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#2C2F36" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="960" fill="url(#grid)"/>

  <!-- Title block (left) -->
  <text x="160" y="380" font-family="Inter, sans-serif" font-size="120" font-weight="700" fill="white" letter-spacing="-2">DS Audit</text>
  <text x="160" y="510" font-family="Inter, sans-serif" font-size="120" font-weight="700" fill="#2A9D4A" letter-spacing="-2">Scanner</text>
  <text x="160" y="610" font-family="Inter, sans-serif" font-size="36" font-weight="400" fill="#969FA8">Token coverage for Larixon design system</text>

  <!-- Right column: sample audit rows -->
  <g transform="translate(1080, 280)">
    <!-- Row 1: Button 100% -->
    <rect x="0" y="0" width="680" height="80" rx="20" fill="#2C2F36"/>
    <text x="32" y="52" fill="white" font-family="Inter, sans-serif" font-size="26" font-weight="500">Button</text>
    <text x="648" y="52" fill="#2A9D4A" font-family="Inter, sans-serif" font-size="26" font-weight="700" text-anchor="end">100%</text>

    <!-- Row 2: Badge 100% -->
    <rect x="0" y="100" width="680" height="80" rx="20" fill="#2C2F36"/>
    <text x="32" y="152" fill="white" font-family="Inter, sans-serif" font-size="26" font-weight="500">Badge</text>
    <text x="648" y="152" fill="#2A9D4A" font-family="Inter, sans-serif" font-size="26" font-weight="700" text-anchor="end">100%</text>

    <!-- Row 3: Tabs 95% -->
    <rect x="0" y="200" width="680" height="80" rx="20" fill="#2C2F36"/>
    <text x="32" y="252" fill="white" font-family="Inter, sans-serif" font-size="26" font-weight="500">Tabs</text>
    <text x="648" y="252" fill="#2A9D4A" font-family="Inter, sans-serif" font-size="26" font-weight="700" text-anchor="end">95%</text>

    <!-- Row 4: Alert 89% -->
    <rect x="0" y="300" width="680" height="80" rx="20" fill="#2C2F36"/>
    <text x="32" y="352" fill="white" font-family="Inter, sans-serif" font-size="26" font-weight="500">Alert</text>
    <text x="648" y="352" fill="#D68A02" font-family="Inter, sans-serif" font-size="26" font-weight="700" text-anchor="end">89%</text>

    <!-- Row 5: Notification 45% -->
    <rect x="0" y="400" width="680" height="80" rx="20" fill="#2C2F36"/>
    <text x="32" y="452" fill="white" font-family="Inter, sans-serif" font-size="26" font-weight="500">Notification</text>
    <text x="648" y="452" fill="#D62828" font-family="Inter, sans-serif" font-size="26" font-weight="700" text-anchor="end">45%</text>
  </g>

  <!-- Bottom-right tag -->
  <text x="1760" y="900" text-anchor="end" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#626C77">larixon · design system</text>
</svg>
